<!doctype html><html lang="es"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tiendita Matemática</title><style>:root{--b:#4285f4;--r:#ea4335;--y:#fbbc04;--g:#34a853;--i:#202124}*{box-sizing:border-box}body{margin:0;font-family:Arial;color:var(--i);background:linear-gradient(135deg,#eef3fe,#fff)}main{max-width:900px;margin:auto;padding:18px}.c{background:#fff;border:1px solid #dadce0;border-radius:24px;padding:24px;margin:14px 0;box-shadow:0 10px 35px #3c404326}.hide{display:none}h1{font-size:clamp(2.2rem,8vw,4.5rem);margin:.2em 0;background:linear-gradient(90deg,var(--b),var(--r),var(--y),var(--g));-webkit-background-clip:text;color:transparent}.btn,.o{border:0;border-radius:18px;padding:15px;font-weight:800;cursor:pointer}.btn{background:var(--b);color:#fff;width:100%;margin-top:10px}.o{background:#fff;border:2px solid #dadce0;text-align:left}.o:hover{border-color:var(--b)}input{width:100%;padding:14px;border:2px solid #dadce0;border-radius:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.bar{height:12px;background:#e8eaed;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--b),var(--g))}.ok{background:#e6f4ea;color:#137333;padding:14px;border-radius:14px}.bad{background:#fce8e6;color:#a50e0e;padding:14px;border-radius:14px}.chip{display:inline-block;padding:7px 11px;border-radius:99px;background:#e8f0fe;color:#174ea6;font-weight:800}.ex{background:#eef3fe;border-radius:18px;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style><main><section id="s" class="c"><span class="chip">Experiencia tipo Gemini</span><h1>Tiendita Matemática</h1><h2>100 retos · 1.º de secundaria</h2><p>Diez niveles progresivos. Cada sección incluye un ejemplo. Si una respuesta es incorrecta, el recorrido vuelve automáticamente a la pregunta 1.</p><input id="n" placeholder="Nombre del alumno"><button class="btn" onclick="start()">Comenzar</button></section><section id="g" class="hide"><div class="c"><div class="top"><b id="who"></b><b id="count"></b></div><div class="bar"><i id="bar"></i></div></div><div id="lesson" class="c"><span class="chip" id="sec"></span><h2 id="lt"></h2><p id="lp"></p><div class="ex" id="le"></div><button class="btn" onclick="begin()">Entendí · comenzar sección</button></div><div id="quiz" class="c hide"><span class="chip" id="skill"></span><h2 id="q"></h2><div class="grid" id="opts"></div><p id="fb" class="hide"></p><button id="next" class="btn hide" onclick="advance()">Siguiente</button></div></section><section id="end" class="c hide"><h1>¡Reto completado!</h1><h2 id="final"></h2><p id="attempts"></p><button class="btn" onclick="location.reload()">Reiniciar</button></section></main><script>
const S=[['Lectura del catálogo','Interpretación de datos','Compara precios y localiza información.','Ejemplo: pera $9 y manzana $8. Como 9>8, la pera cuesta más.'],['Operaciones con precios','Cálculo aritmético','Suma, resta y multiplica precios.','Ejemplo: 3 plátanos de $6 cuestan 3×6=$18.'],['Decimales','Números decimales','Calcula medios, cuartos y precios unitarios.','Ejemplo: 0.5 kg de uva a $40/kg cuesta 40×0.5=$20.'],['Proporcionalidad','Proporcionalidad','Mantén relaciones multiplicativas.','Ejemplo: 5 kg de papa a $20/kg cuestan 5×20=$100.'],['Fracciones','Fracciones','Representa partes de paquetes y cantidades.','Ejemplo: 3 de 12 huevos equivalen a 3/12=1/4.'],['Porcentajes','Porcentajes','Calcula porcentajes de cantidades.','Ejemplo: 10% de $120 es 120×0.10=$12.'],['Descuentos e IVA','Matemática financiera','Aplica descuentos, aumentos e IVA.','Ejemplo: $45 con aumento de 20% queda en 45×1.20=$54.'],['Álgebra','Pensamiento algebraico','Usa incógnitas para representar compras.','Ejemplo: 2x=50, entonces x=25.'],['Presupuesto','Planeación financiera','Administra dinero y optimiza compras.','Ejemplo: $50−($25+$6+$10)=$9 de cambio.'],['Retos integradores','Resolución de problemas','Combina varios procedimientos.','Ejemplo: 2 kg de pollo: 2×65=130; con 10% de descuento queda $117.']];
const base=[['¿Cuánto cuestan 4 manzanas de $8?',32,[24,30,36]],['¿Cuánto cuestan 6 plátanos de $6?',36,[30,42,48]],['¿Cambio de $200 al comprar 2 kg de pollo a $65?',70,[60,65,80]],['¿Costo de 0.5 kg de uva a $40/kg?',20,[15,25,30]],['¿Costo de 1.5 kg de papa a $20/kg?',30,[20,25,40]],['¿Precio unitario si 4 rollos cuestan $20?',5,[4,6,8]],['¿Costo de 5 kg de arroz a $28/kg?',140,[112,128,150]],['¿Cuadernos para 8 alumnos si cada uno recibe uno de $25?',200,[175,190,225]],['¿Qué fracción simplificada son 3 de 12 huevos?','1/4',['1/3','3/4','2/4']],['¿Cuánto es 25% de $120?',30,[25,35,40]]];
const gen=[];for(let i=0;i<100;i++){let s=Math.floor(i/10),b=base[i%10],a=b[1],o=[a,...b[2]];let pos=[0,2,1,3][i%4];o=o.filter(x=>String(x)!=String(a));o.splice(pos,0,a);let txt=b[0];if(s>=5&&i%10<6){let v=100+(i%10)*20,p=10+(s-5)*5,a=v*p/100;txt=`¿Cuánto es ${p}% de $${v}?`;o=[a,a+10,a-10,a+20];o=[...new Set(o)];while(o.length<4)o.push(a+o.length*5);o=o.filter(x=>x!=a);o.splice(pos,0,a)}gen.push({s,t:txt,a:String(a),o:o.map(String)})}
let st={name:'',i:0,tries:0,seen:{}};const $=id=>document.getElementById(id);function start(){let n=$('n').value.trim();if(!n)return alert('Escribe el nombre.');st.name=n;$('s').classList.add('hide');$('g').classList.remove('hide');$('who').textContent=n;load()}function load(){let x=gen[st.i],s=x.s;$('count').textContent=`Pregunta ${st.i+1}/100`;$('bar').style.width=st.i+'%';$('sec').textContent=`Nivel ${s+1}`;if(!st.seen[s]){let z=S[s];$('lesson').classList.remove('hide');$('quiz').classList.add('hide');$('lt').textContent=z[0];$('lp').textContent=z[2];$('le').textContent=z[3]}else show()}function begin(){st.seen[gen[st.i].s]=1;show()}function show(){let x=gen[st.i];$('lesson').classList.add('hide');$('quiz').classList.remove('hide');$('skill').textContent=S[x.s][1];$('q').textContent=x.t;$('fb').className='hide';$('next').classList.add('hide');$('opts').innerHTML=x.o.map((v,j)=>`<button class="o" onclick="ans(this,'${v.replaceAll("'","\\'")}')"><b>${'ABCD'[j]})</b> ${v}</button>`).join('')}function ans(b,v){st.tries++;document.querySelectorAll('.o').forEach(x=>x.disabled=true);let x=gen[st.i];if(v===x.a){b.style.borderColor='#34a853';$('fb').textContent='Correcto. Puedes avanzar.';$('fb').className='ok';$('next').classList.remove('hide')}else{b.style.borderColor='#ea4335';$('fb').innerHTML='<b>Respuesta incorrecta.</b><br>Regresas a la pregunta 1. No se mostrará la solución.';$('fb').className='bad';let name=st.name,tries=st.tries;st={name,i:0,tries,seen:{}};setTimeout(()=>{load();scrollTo(0,0)},2200)}}function advance(){st.i++;if(st.i>=100){$('g').classList.add('hide');$('end').classList.remove('hide');$('final').textContent=`${st.name}: 100 de 100 correctas`;$('attempts').textContent=`Intentos totales: ${st.tries}`;return}load();scrollTo(0,0)}</script></html>
