<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>La Gran Tienda Matemática</title>
<style>
:root{--azul:#1747a6;--azul2:#0f2f74;--celeste:#eaf4ff;--amarillo:#ffd84d;--naranja:#ff8a2a;--verde:#2faa68;--rojo:#ef476f;--morado:#7a4bd8;--texto:#17304d}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,#eef7ff,#fff8e7);color:var(--texto);min-height:100vh}.app{max-width:760px;margin:auto;min-height:100vh;padding:18px}.card{background:white;border-radius:28px;box-shadow:0 18px 50px rgba(23,71,166,.15);overflow:hidden;border:2px solid rgba(23,71,166,.08)}.hero{padding:28px 24px;background:linear-gradient(135deg,var(--azul),#3b7cff);color:white;text-align:center}.hero h1{margin:0;font-size:clamp(30px,8vw,52px);line-height:.98}.hero p{margin:12px 0 0;opacity:.94;font-size:17px}.content{padding:24px}.input{width:100%;padding:16px 18px;border-radius:16px;border:2px solid #d9e4f4;font-size:18px;outline:none;margin:8px 0 16px}.input:focus{border-color:var(--azul)}.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 20px}.grade{border:2px solid #dce7f6;background:#f8fbff;padding:14px 8px;border-radius:16px;font-weight:800;cursor:pointer;font-size:16px}.grade.active{background:var(--amarillo);border-color:#e3b900}.btn{width:100%;border:0;border-radius:18px;padding:16px 20px;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--naranja),#ffb02e);color:white;cursor:pointer;box-shadow:0 10px 24px rgba(255,138,42,.28)}.btn:disabled{opacity:.45;cursor:not-allowed}.topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}.progress-wrap{flex:1;height:12px;background:#e8eef8;border-radius:99px;overflow:hidden}.progress{height:100%;width:0;background:linear-gradient(90deg,var(--verde),#7bdc99);transition:.4s}.counter{font-weight:900;color:var(--azul2);white-space:nowrap}.level{font-size:13px;font-weight:900;color:var(--morado);text-transform:uppercase;letter-spacing:.08em}.question{font-size:clamp(24px,5.5vw,34px);line-height:1.18;margin:8px 0 18px;font-weight:900}.catalog{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 18px}.product{background:#fffdf7;border:2px solid #f1e4ba;border-radius:18px;padding:12px 6px;text-align:center}.product .emoji{font-size:34px}.product b{display:block;font-size:14px;margin-top:3px}.product span{font-size:20px;font-weight:950;color:var(--azul)}.options{display:grid;gap:12px}.option{width:100%;text-align:left;border:2px solid #dce7f4;background:white;border-radius:18px;padding:16px;font-size:18px;font-weight:750;cursor:pointer;transition:.18s}.option:hover{transform:translateY(-2px);border-color:#8eb4ff;background:#f7fbff}.option.correct{background:#e7f9ed;border-color:var(--verde);color:#177642}.option.wrong{background:#fff3f6;border-color:var(--rojo);color:#a91f45}.feedback{margin-top:16px;padding:16px;border-radius:16px;font-weight:850;text-align:center;display:none}.feedback.good{display:block;background:#e6f8ec;color:#156d3b}.feedback.bad{display:block;background:#fff0f3;color:#a52048}.spark{position:fixed;z-index:999;pointer-events:none;font-size:28px;animation:fly 1.15s ease-out forwards}@keyframes fly{from{transform:translate(0,0) scale(.6) rotate(0deg);opacity:1}to{transform:translate(var(--x),var(--y)) scale(1.5) rotate(240deg);opacity:0}}.success-pop{animation:pop .45s ease}@keyframes pop{0%{transform:scale(.96)}55%{transform:scale(1.03)}100%{transform:scale(1)}}.report h2{font-size:34px;margin:0 0 8px;text-align:center}.score{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin:20px auto;background:conic-gradient(var(--verde) var(--pct),#e7edf6 0);position:relative}.score:before{content:"";position:absolute;width:116px;height:116px;background:white;border-radius:50%}.score strong{position:relative;font-size:34px;color:var(--azul2)}.skills{display:grid;gap:10px;margin-top:20px}.skill{background:#f7faff;border-radius:15px;padding:13px 15px;border-left:6px solid var(--azul)}.small{font-size:14px;opacity:.75}.hidden{display:none!important}.footer-note{text-align:center;font-size:13px;opacity:.7;margin-top:14px}@media(max-width:520px){.app{padding:10px}.content{padding:18px}.hero{padding:24px 16px}.catalog{grid-template-columns:repeat(2,1fr)}.grade-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="card" id="startScreen"><div class="hero"><div style="font-size:50px">🛒✨</div><h1>La Gran Tienda Matemática</h1><p>35 retos para aprender a comprar, calcular y pensar.</p></div><div class="content"><label><b>Escribe tu nombre</b></label><input class="input" id="studentName" placeholder="Nombre del alumno o alumna"><label><b>Selecciona tu grado</b></label><div class="grade-grid"><button class="grade" data-grade="1.º">1.º Primaria</button><button class="grade" data-grade="2.º">2.º Primaria</button><button class="grade" data-grade="3.º">3.º Primaria</button></div><button class="btn" id="startBtn" disabled>Comenzar la misión</button><p class="footer-note">Lee con calma. Debes acertar para avanzar. Si te equivocas, regresarás a la pregunta 1.</p></div></div>
<div class="card hidden" id="quizScreen"><div class="content"><div class="topbar"><div class="progress-wrap"><div class="progress" id="progress"></div></div><div class="counter" id="counter">1 / 35</div></div><div class="level" id="level"></div><div class="question" id="question"></div><div class="catalog" id="catalog"></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div></div></div>
<div class="card hidden" id="resultScreen"><div class="hero"><div style="font-size:54px">🏆</div><h1>¡Misión terminada!</h1><p id="resultName"></p></div><div class="content report"><h2>Resultado final</h2><div class="score" id="scoreCircle"><strong id="scoreText"></strong></div><p id="message" style="text-align:center;font-size:18px;font-weight:750"></p><div class="skills" id="skills"></div><button class="btn" onclick="window.print()">Imprimir o guardar resultado</button></div></div>
</div>
<script>
const P={"Manzana":["🍎",6],"Plátano":["🍌",5],"Uvas":["🍇",8],"Naranja":["🍊",6],"Pera":["🍐",7],"Durazno":["🍑",6],"Piña":["🍍",10],"Sandía":["🍉",12],"Melón":["🍈",10],"Fresa":["🍓",9],"Kiwi":["🥝",7],"Cereza":["🍒",8],"Mango":["🥭",9],"Papaya":["🧡",9],"Limón":["🍋",4],"Ciruela":["🟣",6],"Blueberry":["🫐",9],"Aguacate":["🥑",12]};
const Q=[["Observación","¿Cuánto cuesta el plátano?",["Plátano"],["$5","$4","$6","$7"],0],["Observación","¿Cuál es la fruta más barata?",["Limón","Plátano","Manzana","Pera"],["Manzana","Limón","Pera","Plátano"],1],["Observación","¿Qué opción es correcta?",["Pera","Kiwi","Mango","Papaya","Manzana","Naranja","Uvas","Cereza"],["Las uvas y la cereza cuestan $9 cada una.","El mango y la papaya cuestan $8 cada uno.","La pera y el kiwi cuestan $7 cada uno.","La manzana y la naranja cuestan $5 cada una."],2],["Observación","¿Qué opción es correcta?",["Mango","Papaya","Blueberry","Piña","Sandía","Melón","Pera","Kiwi","Limón","Uvas","Cereza","Fresa"],["Piña, sandía y melón cuestan $10 cada uno.","Pera, kiwi y limón cuestan $7 cada uno.","Uvas, cereza y fresa cuestan $8 cada una.","Mango, papaya y blueberry cuestan $9 cada uno."],3],["Comparación","¿Qué opción es correcta?",["Piña","Melón","Sandía","Aguacate","Manzana","Durazno","Limón","Plátano"],["Piña y melón cuestan $10 cada uno.","Manzana y durazno cuestan $7 cada uno.","Limón y plátano cuestan $4 cada uno.","Sandía y aguacate cuestan $10 cada uno."],0],["Sentido numérico","Si tienes $4, ¿qué puedes comprar exactamente?",["Limón","Plátano","Manzana","Uvas"],["Uvas","Limón","Plátano","Manzana"],1],["Comparación","¿Cuáles dos frutas cuestan $8 cada una?",["Uvas","Cereza","Mango","Papaya","Pera","Kiwi","Piña","Melón"],["Mango y papaya","Pera y kiwi","Uvas y cereza","Piña y melón"],2],["Comparación","¿Cuáles son las frutas más caras?",["Piña","Melón","Fresa","Mango","Sandía","Aguacate","Pera","Kiwi"],["Fresa y mango","Pera y kiwi","Piña y melón","Sandía y aguacate"],3],["Observación","¿Cuáles frutas cuestan $6 cada una?",["Manzana","Naranja","Durazno","Ciruela","Pera","Limón","Plátano","Cereza"],["Manzana, naranja, durazno y ciruela","Durazno, limón, manzana y cereza","Manzana, pera, naranja y limón","Naranja, pera, durazno y plátano"],0],["Comparación","¿Cuál cuesta más?",["Kiwi","Pera","Uvas","Limón"],["Kiwi","Uvas","Pera","Limón"],1],["Suma","Manzana ($6) + plátano ($5) =",["Manzana","Plátano"],["$12","$13","$11","$10"],2],["Suma","Limón ($4) + naranja ($6) =",["Limón","Naranja"],["$11","$8","$9","$10"],3],["Suma","Pera ($7) + kiwi ($7) =",["Pera","Kiwi"],["$14","$12","$13","$15"],0],["Suma","Uvas ($8) + cereza ($8) =",["Uvas","Cereza"],["$15","$16","$17","$14"],1],["Suma","Mango ($9) + papaya ($9) =",["Mango","Papaya"],["$19","$16","$18","$17"],2],["Suma","Piña ($10) + melón ($10) =",["Piña","Melón"],["$18","$19","$22","$20"],3],["Suma","Fresa ($9) + limón ($4) =",["Fresa","Limón"],["$13","$12","$14","$11"],0],["Suma","Durazno ($6) + ciruela ($6) + limón ($4) =",["Durazno","Ciruela","Limón"],["$17","$16","$14","$15"],1],["Suma","Manzana ($6) + pera ($7) + naranja ($6) =",["Manzana","Pera","Naranja"],["$17","$18","$19","$20"],2],["Suma","Blueberry ($9) + kiwi ($7) =",["Blueberry","Kiwi"],["$17","$18","$15","$16"],3],["Cambio","Compras un plátano de $5 y pagas con $10. ¿Cuánto cambio recibes?",["Plátano"],["$5","$7","$4","$6"],0],["Cambio","Compras una naranja de $6 y pagas con $10. ¿Cuánto cambio recibes?",["Naranja"],["$2","$4","$3","$5"],1],["Cambio","Compras una piña de $10 y pagas con $20. ¿Cuánto cambio recibes?",["Piña"],["$9","$11","$10","$8"],2],["Cambio","Compras una sandía de $12 y pagas con $20. ¿Cuánto cambio recibes?",["Sandía"],["$9","$6","$7","$8"],3],["Cambio","Compras una fresa de $9 y pagas con $10. ¿Cuánto cambio recibes?",["Fresa"],["$1","$2","$3","$4"],0],["Cambio","Compras mango ($9) y limón ($4). Pagas con $20. ¿Cuánto cambio recibes?",["Mango","Limón"],["$6","$7","$8","$5"],1],["Cambio","Compras pera ($7) y kiwi ($7). Pagas con $20. ¿Cuánto cambio recibes?",["Pera","Kiwi"],["$7","$4","$6","$5"],2],["Presupuesto","Tienes $8 y quieres comprar cereza de $8. ¿Qué pasa?",["Cereza"],["Te falta $1","Te sobra $1","No te alcanza","Te alcanza exactamente"],3],["Presupuesto","Tienes $7 y quieres comprar uvas de $8. ¿Qué pasa?",["Uvas"],["Te falta $1","Te sobra $1","Te faltan $2","Te alcanza exactamente"],0],["Presupuesto","Tienes $15 y compras pera ($7) y kiwi ($7). ¿Cuánto sobra?",["Pera","Kiwi"],["$3","$1","$0","$2"],1],["Presupuesto","Tienes $20 y compras plátano ($5), limón ($4) y manzana ($6). ¿Cuánto sobra?",["Plátano","Limón","Manzana"],["$4","$6","$5","$7"],2],["Estrategia","¿Qué compra puedes hacer exactamente con $12?",["Manzana","Plátano","Pera","Naranja","Limón","Kiwi"],["Naranja + limón","Kiwi + limón","Manzana + plátano","Pera + plátano"],3],["Detección de errores","El cajero dice que piña ($10) + limón ($4) cuestan $15. ¿Qué ocurrió?",["Piña","Limón"],["Cobró $1 de más","Cobró $2 de más","Está correcto","Cobró $1 de menos"],0],["Estrategia","¿Qué pareja de frutas suma exactamente $20?",["Piña","Melón","Mango","Pera","Aguacate","Limón","Fresa","Cereza"],["Mango + pera","Piña + melón","Aguacate + limón","Fresa + cereza"],1],["Resolución de problemas","Tienes $30. Compras manzana ($6), fresa ($9), plátano ($5) y limón ($4). ¿Qué respuesta es correcta?",["Manzana","Fresa","Plátano","Limón"],["Gastaste $23 y sobran $7","Gastaste $25 y sobran $5","Gastaste $24 y sobran $6","Gastaste $22 y sobran $8"],2]];
let current=0,score=0,grade="",student="",locked=false,attempts=1;const skillStats={};const $=id=>document.getElementById(id);document.querySelectorAll(".grade").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".grade").forEach(x=>x.classList.remove("active"));b.classList.add("active");grade=b.dataset.grade;validate()}});$("studentName").addEventListener("input",validate);function validate(){$("startBtn").disabled=!($("studentName").value.trim()&&grade)}$("startBtn").onclick=()=>{student=$("studentName").value.trim();$("startScreen").classList.add("hidden");$("quizScreen").classList.remove("hidden");render()};function render(){locked=false;const[skill,text,products,opts,answer]=Q[current];$("counter").textContent=`${current+1} / ${Q.length}`;$("progress").style.width=`${current/Q.length*100}%`;$("level").textContent=skill;$("question").textContent=text;$("feedback").className="feedback";$("feedback").textContent="";const catalog=$("catalog");catalog.innerHTML="";products.forEach(n=>{const[e,p]=P[n];catalog.innerHTML+=`<div class="product"><div class="emoji">${e}</div><b>${n}</b><span>$${p}</span></div>`});const options=$("options");options.innerHTML="";opts.forEach((o,i)=>{const b=document.createElement("button");b.className="option";b.textContent=`${String.fromCharCode(65+i)}) ${o}`;b.onclick=()=>answerQuestion(i,b,answer,skill);options.appendChild(b)})}function answerQuestion(i,btn,answer,skill){if(locked)return;locked=true;skillStats[skill]??={right:0,total:0};skillStats[skill].total++;if(i===answer){score++;skillStats[skill].right++;btn.classList.add("correct");$("feedback").className="feedback good";$("feedback").textContent="¡Excelente! Respuesta correcta. ⭐";$("quizScreen").classList.add("success-pop");setTimeout(()=>$("quizScreen").classList.remove("success-pop"),450);fireworks();document.querySelectorAll(".option").forEach(x=>x.disabled=true);setTimeout(()=>{current++;current<Q.length?render():finish()},1100)}else{attempts++;btn.classList.add("wrong");$("feedback").className="feedback bad";$("feedback").textContent="La misión vuelve a comenzar. Lee con calma y vuelve a intentarlo desde la pregunta 1.";document.querySelectorAll(".option").forEach(x=>x.disabled=true);setTimeout(()=>{current=0;score=0;for(const key in skillStats)delete skillStats[key];$("quizScreen").classList.remove("success-pop");render()},1300)}}function fireworks(){const stars=["⭐","✨","🌟","💫"];for(let i=0;i<24;i++){const s=document.createElement("div");s.className="spark";s.textContent=stars[Math.floor(Math.random()*stars.length)];s.style.left=35+Math.random()*30+"vw";s.style.top=35+Math.random()*25+"vh";s.style.setProperty("--x",Math.random()*420-210+"px");s.style.setProperty("--y",Math.random()*-420-80+"px");document.body.appendChild(s);setTimeout(()=>s.remove(),1200)}}function finish(){$("quizScreen").classList.add("hidden");$("resultScreen").classList.remove("hidden");$("resultName").textContent=`${student} · ${grade} Primaria · Intentos: ${attempts}`;const pct=100;$("scoreText").textContent=`${score}/35`;$("scoreCircle").style.setProperty("--pct",pct+"%");$("message").textContent="Dominio sobresaliente: completaste las 35 preguntas consecutivas correctamente.";const skills=$("skills");skills.innerHTML="<h3>Habilidades evaluadas</h3>";Object.entries(skillStats).forEach(([k,v])=>{const p=Math.round(v.right/v.total*100);skills.innerHTML+=`<div class="skill"><b>${k}</b><div class="small">${v.right} de ${v.total} respuestas correctas · ${p}%</div></div>`});$("progress").style.width="100%"}
</script>
