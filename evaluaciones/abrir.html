<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cargando cuestionario…</title><style>body{margin:0;display:grid;place-items:center;min-height:100vh;font-family:system-ui;background:linear-gradient(180deg,#eef9f8,#fff9f1);color:#17324d;text-align:center}.box{padding:28px}.spin{width:54px;height:54px;margin:auto;border:7px solid #d8eceb;border-top-color:#138184;border-radius:50%;animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}p{line-height:1.5}</style></head><body><div class="box"><div class="spin"></div><h1>Preparando tu cuestionario</h1><p>Espera unos segundos. No cierres esta ventana.</p></div><script>async function load(){try{const id=new URLSearchParams(location.search).get('nivel');const ok=['1-secundaria','2-secundaria','3-secundaria','1-semestre'];if(!ok.includes(id))throw new Error('Nivel no válido');const text=await fetch(id+'.html.gz.b64').then(r=>{if(!r.ok)throw new Error('No se encontró el cuestionario');return r.text()});const bytes=Uint8Array.from(atob(text.trim()),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<div class="box"><h1>No fue posible abrir el cuestionario</h1><p>'+e.message+'</p><p><a href="index.html">Volver al menú</a></p></div>'}}load();</script></body></html>
